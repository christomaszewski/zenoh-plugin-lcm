name: Check for new LCM release

on:
  schedule:
    # Run weekly on Monday at 09:00 UTC (LCM releases infrequently)
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get last tracked LCM version
        id: tracked
        run: |
          # Store the last seen version in a known location
          if [ -f .github/lcm-version.txt ]; then
            echo "version=$(cat .github/lcm-version.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "version=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Get latest LCM release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh api repos/lcm-proj/lcm/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$tag" ]; then
            # Fall back to tags if no GitHub release exists
            tag=$(gh api repos/lcm-proj/lcm/tags --jq '.[0].name' 2>/dev/null || echo "")
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          if [ -z "${{ steps.latest.outputs.version }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.tracked.outputs.version }}" = "${{ steps.latest.outputs.version }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing issue
        if: steps.compare.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open=$(gh issue list --label "lcm-update" --state open --json number --jq 'length')
          if [ "$open" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create labels if missing
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "lcm-update" --description "New LCM release detected" --color "d876e3" 2>/dev/null || true
          gh label create "automated" --description "Created by automation" --color "e4e669" 2>/dev/null || true

      - name: Get release notes
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh api repos/lcm-proj/lcm/releases/latest --jq '.body' 2>/dev/null || echo "No release notes available.")
          # Truncate if very long
          if [ ${#body} -gt 2000 ]; then
            body="${body:0:2000}... (truncated)"
          fi
          # Write to file to avoid quoting issues
          echo "$body" > /tmp/lcm-release-notes.txt

      - name: Open advisory issue
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.latest.outputs.version }}
          OLD_VERSION: ${{ steps.tracked.outputs.version }}
        run: |
          release_notes=$(cat /tmp/lcm-release-notes.txt)

          gh issue create \
            --title "LCM ${NEW_VERSION} released — review for impact" \
            --label "lcm-update,automated" \
            --body "$(cat <<EOF
          ## New LCM release: ${NEW_VERSION}

          A new version of [LCM](https://github.com/lcm-proj/lcm) has been released. Since this bridge implements the LCM wire protocol (LC02/LC03), please review the release for:

          - Wire protocol changes (new message types, header format changes)
          - New fragmentation behavior
          - Multicast transport changes
          - Any breaking changes that could affect interoperability

          ### Release notes

          <details>
          <summary>LCM ${NEW_VERSION} release notes</summary>

          ${release_notes}

          </details>

          ### Action items
          - [ ] Review release notes for wire protocol or transport changes
          - [ ] If changes detected: update \`lcm-transport\` crate and tests
          - [ ] If no impact: close this issue and update tracked version

          Previously tracked version: **${OLD_VERSION}**

          > Auto-generated by the [check-lcm-release](.github/workflows/check-lcm-release.yml) workflow.
          EOF
          )"

      - name: Update tracked version
        if: steps.compare.outputs.changed == 'true' && steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.latest.outputs.version }}
        run: |
          mkdir -p .github
          echo "$NEW_VERSION" > .github/lcm-version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/lcm-version.txt
          git commit -m "Track LCM version ${NEW_VERSION}"
          git push
