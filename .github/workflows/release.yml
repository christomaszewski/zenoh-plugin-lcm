name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_call:
    inputs:
      version:
        description: "Version/tag to release (e.g. 1.9.0). Must already exist as a git tag."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag to release (e.g. 1.9.0). Must already exist as a git tag."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: zenoh-bridge-lcm
            plugin: libzenoh_plugin_lcm.so
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: zenoh-bridge-lcm
            plugin: libzenoh_plugin_lcm.so
          - target: x86_64-apple-darwin
            os: macos-14
            binary: zenoh-bridge-lcm
            plugin: libzenoh_plugin_lcm.dylib
          - target: aarch64-apple-darwin
            os: macos-14
            binary: zenoh-bridge-lcm
            plugin: libzenoh_plugin_lcm.dylib

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp target/${{ matrix.target }}/release/${{ matrix.plugin }} dist/
          cp DEFAULT_CONFIG.json5 dist/
          cp LICENSE dist/
          cd dist
          tar czf "../zenoh-bridge-lcm-${VERSION}-${{ matrix.target }}.tar.gz" *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenoh-bridge-lcm-${{ matrix.target }}
          path: zenoh-bridge-lcm-${{ env.VERSION }}-${{ matrix.target }}.tar.gz

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref_name }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
      - name: Run tests
        run: cargo test --workspace

  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=$(find artifacts -name '*.tar.gz' -type f)

          gh release create "${VERSION}" \
            --title "zenoh-bridge-lcm ${VERSION}" \
            --generate-notes \
            --notes "$(cat <<EOF
          ## zenoh-bridge-lcm ${VERSION}

          Compatible with **Zenoh ${VERSION}**.

          ### Assets
          | Platform | Architecture | File |
          |----------|-------------|------|
          | Linux | x86_64 | \`zenoh-bridge-lcm-${VERSION}-x86_64-unknown-linux-gnu.tar.gz\` |
          | Linux | aarch64 | \`zenoh-bridge-lcm-${VERSION}-aarch64-unknown-linux-gnu.tar.gz\` |
          | macOS | x86_64 | \`zenoh-bridge-lcm-${VERSION}-x86_64-apple-darwin.tar.gz\` |
          | macOS | aarch64 | \`zenoh-bridge-lcm-${VERSION}-aarch64-apple-darwin.tar.gz\` |

          Each archive contains:
          - \`zenoh-bridge-lcm\` — standalone bridge binary
          - \`libzenoh_plugin_lcm.so\` (or \`.dylib\`) — Zenoh router plugin
          - \`DEFAULT_CONFIG.json5\` — commented configuration example
          - \`LICENSE\` — dual EPL-2.0 / Apache-2.0
          EOF
          )" \
            $files
